<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakacje 2026 – kto kiedy może</title>
<style>
  body { font-family: sans-serif; padding: 2rem; background: #f9f9f9; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; }
  table { border-collapse: collapse; width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  th { background: #5c3d9e; color: white; padding: 10px 14px; font-size: 13px; white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  .yes { text-align: center; }
  .yes::after { content: "✓"; color: #2e7d32; font-weight: bold; font-size: 16px; }
  .no { text-align: center; color: #ccc; }
  .no::after { content: "–"; }
  #status { margin-bottom: 1rem; font-size: 13px; color: #888; }
  #error { color: red; }
</style>
</head>
<body>
<h1>Wakacje 2026 – dostępność</h1>
<div id="status">Ładowanie danych...</div>
<div id="error"></div>
<div id="table-container"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuiduqlhiE5nhltCLwjTTCnaylBnMQFJR8-f1kwivbcnHSti5lQcWd_P6K7cpE1ewLS6dfL_9LDhyy/pub?output=csv";

function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => line.split(",").map(c => c.trim().replace(/^"|"$/g, "")));
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
}

async function load() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);

    const data = rows.slice(1).filter(r => r[0] && r[1]);
    const people = [...new Set(data.map(r => r[0]))].sort();
    const dates = [...new Set(data.map(r => r[1]))].sort();

    const lookup = new Set(data.map(r => r[0] + "|" + r[1]));

    let html = "<table><thead><tr><th>Osoba</th>";
    dates.forEach(d => { html += `<th>${formatDate(d)}</th>`; });
    html += "</tr></thead><tbody>";

    people.forEach(person => {
      html += `<tr><td><strong>${person}</strong></td>`;
      dates.forEach(d => {
        html += lookup.has(person + "|" + d)
          ? `<td class="yes"></td>`
          : `<td class="no"></td>`;
      });
      html += "</tr>";
    });

    html += "</tbody></table>";
    document.getElementById("table-container").innerHTML = html;
    document.getElementById("status").textContent = `Ostatnia aktualizacja: ${new Date().toLocaleTimeString("pl-PL")}`;
  } catch (e) {
    document.getElementById("error").textContent = "Błąd ładowania danych: " + e.message;
    document.getElementById("status").textContent = "";
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
