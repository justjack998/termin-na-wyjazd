<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wypad nad jezioro 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #1c1208;
    --mid: #5a3c18;
    --muted: #8a6a40;
    --orange: #d4742a;
  }

  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(180deg, #b8d4f0 0%, #f0d898 48%, #e89850 72%, #c87830 85%, #7a9868 93%, #4a6848 100%);
    overflow-x: hidden;
    position: relative;
  }

  .scene-img {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    height: 300px;
    object-fit: cover;
    object-position: center bottom;
    pointer-events: none;
    z-index: 0;
    image-rendering: pixelated;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem 18rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2.8rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dark);
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.15;
    letter-spacing: -0.03em;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--mid);
    margin-top: 0.5rem;
    font-weight: 400;
  }

  #status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .winners-card {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 32px rgba(100,60,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    text-align: center;
  }

  .section-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 0.4rem;
  }

  .winners-heading {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 1.2rem;
    letter-spacing: -0.02em;
  }

  .winners-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
  }

  .winner-chip {
    background: linear-gradient(135deg, #e8a030, #c87020);
    color: white;
    border-radius: 100px;
    padding: 0.55rem 1.2rem;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    box-shadow: 0 2px 8px rgba(200,112,32,0.35);
  }

  .no-winners {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .table-card {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(100,60,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    margin-bottom: 1rem;
  }

  .table-header-bar {
    padding: 1.1rem 1.4rem 0.5rem;
    border-bottom: 1px solid rgba(100,60,0,0.08);
  }

  .table-wrap { overflow-x: auto; }

  table { border-collapse: collapse; width: 100%; }

  thead tr { background: rgba(28,18,8,0.06); }

  th {
    padding: 11px 14px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    text-align: center;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  th.name-col { text-align: left; min-width: 140px; color: var(--mid); }

  tbody tr { transition: background 0.12s; }
  tbody tr:not(:last-child) td { border-bottom: 1px solid rgba(100,60,0,0.07); }
  tbody tr:hover { background: rgba(232,160,48,0.07); }

  td {
    padding: 13px 14px;
    font-size: 14px;
    text-align: center;
    color: var(--mid);
  }

  td.name-col {
    text-align: left;
    font-weight: 600;
    color: var(--dark);
    font-size: 14px;
  }

  .yes { color: #d4742a; font-size: 17px; font-weight: 700; }
  .no { color: rgba(90,60,24,0.18); font-size: 15px; }

  .legend {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    padding: 0.2rem 0;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }

  #error { color: #c03010; text-align: center; padding: 1rem; font-size: 13px; }
</style>
</head>
<body>

<img class="scene-img" src="Gemini_Generated_Image_w03jq2w03jq2w03j.png" alt="Pixel art lake campfire scene"/>

<div class="content">
  <div class="header">
    <div class="badge">🏕 Lato 2026</div>
    <h1>Wypad nad jezioro</h1>
    <p class="subtitle">Domki · Ognisko · Ekipa · Jezioro</p>
    <p id="status">Ładowanie danych…</p>
  </div>

  <div class="winners-card">
    <div class="section-eyebrow">🔥 pasuje wszystkim</div>
    <div class="winners-heading">Najlepsze terminy</div>
    <div id="winners-container"><div class="no-winners">Ładowanie…</div></div>
  </div>

  <div class="table-card">
    <div class="table-header-bar">
      <div class="section-eyebrow" style="margin:0">Pełna dostępność</div>
    </div>
    <div class="table-wrap">
      <div id="table-container"></div>
    </div>
  </div>

  <div class="legend">
    <span><span style="color:#d4742a;font-weight:700">✓</span> Pasuje</span>
    <span><span style="opacity:0.25">–</span> Nie pasuje</span>
  </div>

  <div id="error"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuiduqlhiE5nhltCLwjTTCnaylBnMQFJR8-f1kwivbcnHSti5lQcWd_P6K7cpE1ewLS6dfL_9LDhyy/pub?output=csv";
const PL_MONTHS = ["Sty","Lut","Mar","Kwi","Maj","Cze","Lip","Sie","Wrz","Paź","Lis","Gru"];

function formatDate(str) {
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.getDate() + "\u00a0" + PL_MONTHS[d.getMonth()];
}

function parseCSV(text) {
  return text.trim().split("\n").map(line => {
    const cols = []; let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

async function load() {
  try {
    const res  = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const headers  = rows[0];
    const dateCols = headers.slice(1);
    const dataRows = rows.slice(1).filter(r => r[0]);

    let html = "<table><thead><tr><th class='name-col'>Osoba</th>";
    dateCols.forEach(d => { html += `<th>${formatDate(d)}</th>`; });
    html += "</tr></thead><tbody>";
    dataRows.forEach(row => {
      html += `<tr><td class="name-col">${row[0]}</td>`;
      for (let i = 1; i <= dateCols.length; i++) {
        html += row[i] === "1" ? `<td class="yes">✓</td>` : `<td class="no">–</td>`;
      }
      html += "</tr>";
    });
    html += "</tbody></table>";
    document.getElementById("table-container").innerHTML = html;
    document.getElementById("status").textContent = `Ostatnia aktualizacja: ${new Date().toLocaleTimeString("pl-PL")}`;

    const winners = dateCols.filter((_, i) => dataRows.every(r => r[i + 1] === "1"));
    const wc = document.getElementById("winners-container");
    wc.innerHTML = winners.length === 0
      ? `<div class="no-winners">Żaden termin nie pasuje jeszcze wszystkim — czekamy na odpowiedzi 😊</div>`
      : `<div class="winners-grid">${winners.map(d => `<div class="winner-chip">🔥 ${formatDate(d)}</div>`).join("")}</div>`;
  } catch (e) {
    document.getElementById("error").textContent = "Błąd: " + e.message;
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
