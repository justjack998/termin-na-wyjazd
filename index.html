<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wypad nad jezioro 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: #f7f3ee;
    color: #1e1408;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── MAIN CONTENT ── */
  .page {
    flex: 1;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 4rem 1.5rem 3.5rem;
  }

  /* ── HEADER ── */
  .header { margin-bottom: 3rem; }

  .tag {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #b06820;
    background: #f5e6d0;
    border-radius: 6px;
    padding: 4px 10px;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.05;
    color: #1e1408;
    margin-bottom: 0.5rem;
  }

  .meta {
    font-size: 12px;
    color: #a08870;
    font-weight: 400;
    margin-top: 0.4rem;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(to right, #e8d8c0, transparent);
    margin: 2.5rem 0;
  }

  /* ── WINNERS ── */
  .winners-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #b06820;
    margin-bottom: 0.6rem;
  }

  .winners-title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #1e1408;
    margin-bottom: 1.2rem;
  }

  .winners-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .winner-chip {
    background: #1e1408;
    color: #f7f3ee;
    border-radius: 100px;
    padding: 0.55rem 1.2rem;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .winner-chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #e09030;
    flex-shrink: 0;
  }

  .no-winners {
    font-size: 14px;
    color: #a08870;
  }

  /* ── TABLE SECTION ── */
  .table-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #a08870;
    margin-bottom: 1rem;
  }

  .table-wrap { overflow-x: auto; }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  thead tr {
    border-bottom: 1.5px solid #e8d8c0;
  }

  th {
    padding: 0 14px 10px;
    font-size: 10.5px;
    font-weight: 600;
    white-space: nowrap;
    text-align: center;
    color: #a08870;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  th.name-col { text-align: left; min-width: 130px; }

  tbody tr { transition: background 0.1s; }
  tbody tr:not(:last-child) td { border-bottom: 1px solid #f0e8d8; }
  tbody tr:hover { background: #f5f0e8; }

  td {
    padding: 13px 14px;
    font-size: 14px;
    text-align: center;
    color: #a08870;
  }

  td.name-col {
    text-align: left;
    font-weight: 600;
    color: #1e1408;
    font-size: 14px;
  }

  .yes { color: #c87820; font-size: 15px; font-weight: 700; }
  .no  { color: #e0d4c0; font-size: 14px; }

  .legend {
    display: flex;
    gap: 1.2rem;
    margin-top: 1.2rem;
    font-size: 11px;
    color: #b0a090;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }

  #error { color: #b03010; padding: 1rem; font-size: 13px; }

  /* ── PIXEL ART FOOTER ── */
  .pixel-footer {
    width: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    margin-top: auto;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="tag">Lato 2026</div>
    <h1>Wypad<br>nad jezioro</h1>
    <p class="meta" id="status">Ładowanie danych…</p>
  </div>

  <!-- WINNERS -->
  <div class="winners-label">Pasuje wszystkim</div>
  <div class="winners-title">Najlepsze terminy</div>
  <div id="winners-container"><div class="no-winners">Ładowanie…</div></div>

  <div class="divider"></div>

  <!-- TABLE -->
  <div class="table-label">Pełna dostępność</div>
  <div class="table-wrap">
    <div id="table-container"></div>
  </div>

  <div class="legend">
    <span><span style="color:#c87820;font-weight:700">✓</span> Pasuje</span>
    <span><span style="color:#e0d4c0">–</span> Nie pasuje</span>
  </div>

  <div id="error"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuiduqlhiE5nhltCLwjTTCnaylBnMQFJR8-f1kwivbcnHSti5lQcWd_P6K7cpE1ewLS6dfL_9LDhyy/pub?output=csv";
const PL_MONTHS = ["Sty","Lut","Mar","Kwi","Maj","Cze","Lip","Sie","Wrz","Paź","Lis","Gru"];

function formatDate(str) {
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.getDate() + "\u00a0" + PL_MONTHS[d.getMonth()];
}

function parseCSV(text) {
  return text.trim().split("\n").map(line => {
    const cols = []; let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

async function load() {
  try {
    const res  = await fetch(CSV_URL + "&t=" + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const headers  = rows[0];
    const dateCols = headers.slice(1);
    const dataRows = rows.slice(1).filter(r => r[0]);

    let html = "<table><thead><tr><th class='name-col'>Osoba</th>";
    dateCols.forEach(d => { html += `<th>${formatDate(d)}</th>`; });
    html += "</tr></thead><tbody>";
    dataRows.forEach(row => {
      html += `<tr><td class="name-col">${row[0]}</td>`;
      for (let i = 1; i <= dateCols.length; i++) {
        html += row[i] === "1" ? `<td class="yes">✓</td>` : `<td class="no">–</td>`;
      }
      html += "</tr>";
    });
    html += "</tbody></table>";
    document.getElementById("table-container").innerHTML = html;
    document.getElementById("status").textContent = `Ostatnia aktualizacja: ${new Date().toLocaleTimeString("pl-PL")}`;

    const winners = dateCols.filter((_, i) => dataRows.every(r => r[i + 1] === "1"));
    const wc = document.getElementById("winners-container");
    wc.innerHTML = winners.length === 0
      ? `<div class="no-winners">Żaden termin nie pasuje jeszcze wszystkim — czekamy na odpowiedzi 😊</div>`
      : `<div class="winners-grid">${winners.map(d => `<div class="winner-chip"><span class="dot"></span>${formatDate(d)}</div>`).join("")}</div>`;
  } catch (e) {
    document.getElementById("error").textContent = "Błąd: " + e.message;
  }
}

load();
setInterval(load, 60000);
</script>
</body>
